<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMINE Secure Minerba Database</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-user-select:none;
-moz-user-select:none;
-ms-user-select:none;
user-select:none;
}

html,body{
width:100%;
height:100%;
font-family:'Poppins',sans-serif;
background:
radial-gradient(circle at top left,rgba(255,215,0,.15),transparent 25%),
radial-gradient(circle at bottom right,rgba(255,140,0,.12),transparent 25%),
linear-gradient(135deg,#050505,#111,#1b1b1b);
color:#fff;
overflow-x:hidden;
}

body::before{
content:'';
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),
linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);
background-size:40px 40px;
pointer-events:none;
}
</html>
