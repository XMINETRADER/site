<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terima Kasih - XMINE</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root {
  --gold: #d4af37;
  --gold-soft: #f5deb3;
  --dark: #05070d;
  --navy: #0f172a;
  --glass: rgba(255,255,255,0.05);
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(180deg, var(--dark), var(--navy));
  color: white;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
}

.container {
  max-width: 700px;
  text-align: center;
  background: var(--glass);
  padding: 50px;
  border-radius: 25px;
  border: 1px solid rgba(212,175,55,.15);
  backdrop-filter: blur(14px);
}

.logo {
  width: 120px;
  margin-bottom: 20px;
}

h1 {
  font-size: 2.5rem;
  color: var(--gold);
  margin-bottom: 20px;
}

p {
  color: #d6d6d6;
  line-height: 1.8;
  margin-bottom: 15px;
}

.btn-home {
  display: inline-block;
  margin-top: 20px;
  padding: 14px 30px;
  border-radius: 30px;
  background: linear-gradient(135deg,var(--gold),var(--gold-soft));
  color: black;
  text-decoration: none;
  font-weight: 700;
  transition: .3s;
}

.btn-home:hover {
  transform: translateY(-4px);
}
</style>
</head>
<body>

<div class="container">
  <img src="logo.png" alt="XMINE Trusted Seller Buyer Network" class="logo">

  <h1>Terima Kasih</h1>

  <p>Pesan Anda telah berhasil dikirim ke tim XMINE.</p>
  <p>Kami akan segera menghubungi Anda untuk proses verifikasi, konsultasi, dan tindak lanjut transaksi.</p>
  <p>Pastikan nomor WhatsApp dan email Anda aktif agar proses komunikasi berjalan lancar.</p>

  <a href="/" class="btn-home">Kembali ke Beranda</a>
</div>

</body>
</html>
