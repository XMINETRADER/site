<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XMINE Minerba Database</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      background:
        radial-gradient(circle at top left, rgba(255, 215, 0, 0.18), transparent 25%),
        radial-gradient(circle at bottom right, rgba(255, 140, 0, 0.18), transparent 25%),
        linear-gradient(135deg, #050505 0%, #111111 35%, #1b1b1b 100%);
      color: #ffffff;
      padding: 40px 20px;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 2;
      max-width: 1400px;
      margin: auto;
    }

    .hero {
      text-align: center;
      margin-bottom: 35px;
      padding: 50px 30px;
      border-radius: 28px;
      background: rgba(255,255,255,0.06);
      backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 10px 40px rgba(0,0,0,0.45);
    }

    .hero h1 {
      font-size: 42px;
      font-weight: 700;
      background: linear-gradient(90deg, #FFD700, #FFA500, #FFF2B2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 15px;
      letter-spacing: 1px;
    }

    .hero p {
      color: #d9d9d9;
      font-size: 16px;
      line-height: 1.7;
      max-width: 850px;
      margin: auto;
    }

    .search-box {
      display: flex;
      gap: 14px;
      margin-top: 35px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .search-box input {
      width: 650px;
      max-width: 100%;
      padding: 18px 22px;
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 16px;
      outline: none;
      backdrop-filter: blur(12px);
      transition: 0.3s ease;
      box-shadow: inset 0 0 15px rgba(255,255,255,0.03);
    }

    .search-box input:focus {
      border-color: rgba(255,215,0,0.7);
      box-shadow: 0 0 0 4px rgba(255,215,0,0.12);
    }

    .search-box input::placeholder {
      color: rgba(255,255,255,0.6);
    }

    .btn {
      padding: 16px 28px;
      border: none;
      border-radius: 18px;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      transition: all 0.3s ease;
      letter-spacing: 0.4px;
    }

    .btn-search {
      background: linear-gradient(135deg, #FFD700, #FF9800);
      color: #111;
      box-shadow: 0 8px 20px rgba(255, 166, 0, 0.35);
    }

    .btn-search:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(255, 166, 0, 0.45);
    }

    .btn-clear {
      background: rgba(255,255,255,0.08);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.12);
      backdrop-filter: blur(10px);
    }

    .btn-clear:hover {
      background: rgba(255,255,255,0.15);
      transform: translateY(-2px);
    }

    #status {
      margin: 25px 0;
      text-align: center;
      font-weight: 500;
      font-size: 16px;
      color: #ffe08a;
    }

    #results {
      display: grid;
      gap: 25px;
    }

    .company {
      position: relative;
      overflow: hidden;
      border-radius: 26px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(20px);
      padding: 28px;
      box-shadow: 0 12px 35px rgba(0,0,0,0.35);
      transition: all 0.35s ease;
    }

    .company::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #FFD700, #FF9800, #FFE082);
    }

    .company:hover {
      transform: translateY(-5px);
      border-color: rgba(255,215,0,0.25);
      box-shadow: 0 18px 40px rgba(0,0,0,0.45);
    }

    .company h3 {
      font-size: 26px;
      margin-bottom: 18px;
      color: #FFD54F;
    }

    .company-info {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      margin-bottom: 25px;
    }

    .info-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 18px;
      padding: 16px;
    }

    .info-card span {
      display: block;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #bcbcbc;
      margin-bottom: 8px;
    }

    .info-card strong {
      color: #ffffff;
      font-size: 15px;
      line-height: 1.6;
      word-break: break-word;
    }

    .section {
      margin-top: 22px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 22px;
      overflow: hidden;
    }

    .section h4 {
      padding: 18px 22px;
      background: rgba(255,215,0,0.08);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      color: #FFD54F;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      background: rgba(255,255,255,0.06);
      color: #FFD54F;
      font-weight: 600;
      text-align: left;
      padding: 16px;
      font-size: 14px;
    }

    td {
      padding: 15px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      color: #f1f1f1;
      font-size: 14px;
      line-height: 1.5;
    }

    tr:hover td {
      background: rgba(255,255,255,0.03);
    }

    .empty {
      padding: 20px;
      color: #cfcfcf;
    }

    .footer {
      text-align: center;
      margin-top: 45px;
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      body {
        padding: 20px 14px;
      }

      .hero {
        padding: 35px 20px;
      }

      .hero h1 {
        font-size: 30px;
      }

      .search-box {
        flex-direction: column;
      }

      .search-box input,
      .btn {
        width: 100%;
      }

      .company {
        padding: 20px;
      }

      .company h3 {
        font-size: 22px;
      }

      table {
        display: block;
        overflow-x: auto;
        white-space: nowrap;
      }
    }
  </style>
</head>
<body>

  <div class="container">

    <div class="hero">
      <h1>XMINE MINERBA DATABASE</h1>
      <p>
        Sistem pencarian data badan usaha minerba Indonesia dengan tampilan premium,
        modern, cepat, dan responsif untuk kebutuhan riset perusahaan, supplier,
        investor, maupun trading mineral.
      </p>

      <div class="search-box">
        <input type="text" id="searchInput" placeholder="Cari nama perusahaan minerba..." autocomplete="off">
        <button class="btn btn-search" onclick="searchCompanies()">🔍 Cari Data</button>
        <button class="btn btn-clear" onclick="clearSearch()">✖ Clear</button>
      </div>
    </div>

    <div id="status"></div>
    <div id="results"></div>

    <div class="footer">
      © 2026 XMINE Database System • Premium Mining Intelligence
    </div>

  </div>

  <script>
    let allCompanies = [];

    const url = "https://raw.githubusercontent.com/XMINETRADER/cms-travel/refs/heads/main/minerba_company_detail.json";

    async function loadData() {
      const status = document.getElementById('status');

      status.innerHTML = "⏳ Memuat database minerba premium...";

      try {
        const res = await fetch(url);
        allCompanies = await res.json();

        status.innerHTML = `✅ Database berhasil dimuat: <b>${allCompanies.length.toLocaleString('id-ID')}</b> perusahaan`;
      } catch (e) {
        status.innerHTML = `<span style="color:#ff8a80">❌ Gagal memuat data database</span>`;
      }
    }

    function searchCompanies() {
      const keyword = document.getElementById('searchInput').value.toLowerCase().trim();
      const resultsDiv = document.getElementById('results');

      if (!keyword) {
        resultsDiv.innerHTML = `
          <div class="company">
            <div class="empty">⚠ Silakan masukkan nama perusahaan terlebih dahulu.</div>
          </div>`;
        return;
      }

      const filtered = allCompanies.filter(item => {
        const nama = item.data?.nama_badan_usaha || "";
        return nama.toLowerCase().includes(keyword);
      });

      document.getElementById('status').innerHTML = `🔎 Ditemukan <b>${filtered.length}</b> perusahaan`;

      if (filtered.length === 0) {
        resultsDiv.innerHTML = `
          <div class="company">
            <div class="empty">❌ Perusahaan tidak ditemukan.</div>
          </div>`;
        return;
      }

      let html = '';

      filtered.forEach(company => {
        const d = company.data || {};

        html += `
          <div class="company">

            <h3>${d.nama_badan_usaha || '-'}</h3>

            <div class="company-info">
              <div class="info-card">
                <span>NIB</span>
                <strong>${d.nib || '-'}</strong>
              </div>

              <div class="info-card">
                <span>No Telp</span>
                <strong>${d.no_telp || '-'}</strong>
              </div>

              <div class="info-card">
                <span>NPWP</span>
                <strong>${d.npwp_badan_usaha || '-'}</strong>
              </div>

              <div class="info-card">
                <span>Alamat</span>
                <strong>${d.alamat || '-'}</strong>
              </div>
            </div>

            <div class="section">
              <h4>👥 Direksi Perusahaan</h4>
              ${renderDireksi(d.direksi)}
            </div>

            <div class="section">
              <h4>👤 Pemegang Saham</h4>
              ${renderPemegangSaham(d.pemegang_saham)}
            </div>

            ${d.akta && d.akta.length ? `
              <div class="section">
                <h4>📜 Informasi Akta</h4>
                ${renderAkta(d.akta)}
              </div>` : ''}

          </div>`;
      });

      resultsDiv.innerHTML = html;
    }

    function renderDireksi(direksi) {
      if (!direksi || direksi.length === 0) {
        return `<div class="empty">Tidak ada data direksi.</div>`;
      }

      let html = `
        <table>
          <tr>
            <th>Jabatan</th>
            <th>Nama Direksi</th>
          </tr>`;

      direksi.forEach(d => {
        html += `
          <tr>
            <td>${d.jabatan?.nama_jabatan || '-'}</td>
            <td>${d.nama_direksi || '-'}</td>
          </tr>`;
      });

      html += `</table>`;
      return html;
    }

    function renderPemegangSaham(saham) {
      if (!saham || saham.length === 0) {
        return `<div class="empty">Tidak ada data pemegang saham.</div>`;
      }

      let html = `
        <table>
          <tr>
            <th>Nama</th>
            <th>Persentase</th>
            <th>Jenis</th>
          </tr>`;

      saham.forEach(s => {
        html += `
          <tr>
            <td>${s.nama_pemegang_saham || '-'}</td>
            <td><strong>${parseFloat(s.persentase_saham || 0).toFixed(2)}%</strong></td>
            <td>${s.jenis_pemegang_saham || '-'}</td>
          </tr>`;
      });

      html += `</table>`;
      return html;
    }

    function renderAkta(akta) {
      let html = `
        <table>
          <tr>
            <th>No Akta</th>
            <th>Tanggal</th>
            <th>Total Modal</th>
          </tr>`;

      akta.forEach(a => {
        html += `
          <tr>
            <td>${a.nomor_akta || '-'}</td>
            <td>${a.tanggal_akta || '-'}</td>
            <td>Rp ${parseFloat(a.total_modal || 0).toLocaleString('id-ID')}</td>
          </tr>`;
      });

      html += `</table>`;
      return html;
    }

    function clearSearch() {
      document.getElementById('searchInput').value = '';
      document.getElementById('results').innerHTML = '';

      document.getElementById('status').innerHTML =
        `✅ Database siap digunakan`;
    }

    document.getElementById('searchInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        searchCompanies();
      }
    });

    window.onload = loadData;
  </script>

</body>
</html>
