<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Secure Access</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0f172a;
    overflow:hidden;
    height:100vh;
    color:white;
}

/* BACKGROUND */

.bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top left,#2563eb33,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed33,transparent 30%),
    #020617;
}

/* MAIN CONTENT */

.main-content{
    position:relative;
    z-index:1;
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    filter:blur(8px);
    user-select:none;
    pointer-events:none;
    transition:.4s;
}

.main-content.unlocked{
    filter:none;
    pointer-events:auto;
}

.main-content h1{
    font-size:50px;
    margin-bottom:10px;
}

.main-content p{
    opacity:.7;
}

/* LOGIN MODAL */

.overlay{
    position:fixed;
    inset:0;
    background:#00000090;
    backdrop-filter:blur(8px);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:999;
}

.login-box{
    width:360px;
    background:rgba(15,23,42,.8);
    border:1px solid rgba(255,255,255,.08);
    border-radius:24px;
    padding:35px;
    box-shadow:
    0 0 40px rgba(0,0,0,.5),
    0 0 80px rgba(59,130,246,.15);
    animation:popup .4s ease;
}

@keyframes popup{
    from{
        transform:scale(.8);
        opacity:0;
    }
    to{
        transform:scale(1);
        opacity:1;
    }
}

.logo{
    width:70px;
    height:70px;
    border-radius:20px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:28px;
    margin:auto;
    margin-bottom:20px;
}

.login-box h2{
    text-align:center;
    margin-bottom:8px;
}

.login-box p{
    text-align:center;
    opacity:.6;
    font-size:14px;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group input{
    width:100%;
    padding:14px 16px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    font-size:15px;
    transition:.3s;
}

.input-group input:focus{
    background:#263449;
    box-shadow:0 0 0 2px #3b82f6;
}

.login-btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    opacity:.9;
}

.error{
    margin-top:15px;
    text-align:center;
    color:#f87171;
    font-size:14px;
    display:none;
}

.footer{
    margin-top:20px;
    text-align:center;
    font-size:12px;
    opacity:.4;
}

</style>
</head>
<body>

<div class="bg"></div>

<!-- LOCKED CONTENT -->

<div class="main-content" id="content">

    <h1>PRIVATE ACCESS</h1>
    <p>Authorized users only</p>

</div>

<!-- LOGIN POPUP -->

<div class="overlay" id="overlay">

    <div class="login-box">

        <div class="logo">
            🔒
        </div>

        <h2>Secure Login</h2>
        <p>Enter password to continue</p>

        <div class="input-group">
            <input
                type="password"
                id="password"
                placeholder="Enter password"
            >
        </div>

        <button class="login-btn" onclick="login()">
            Unlock Access
        </button>

        <div class="error" id="error">
            Wrong password
        </div>

        <div class="footer">
            Protected Area
        </div>

    </div>

</div>

<script>

/*
========================================
CONFIG
========================================
*/

const HASH =
"e6001a8e8bac021be5233131bb7f0a4a";

/*
Password asli:
admin123

MD5 generator:
https://www.md5hashgenerator.com
*/

/*
========================================
MD5 FUNCTION
========================================
*/

async function md5(str){

    const msgUint8 =
        new TextEncoder().encode(str);

    const hashBuffer =
        await crypto.subtle.digest(
            "MD5",
            msgUint8
        );

    const hashArray =
        Array.from(new Uint8Array(hashBuffer));

    return hashArray
        .map(b =>
            b.toString(16)
            .padStart(2,"0")
        )
        .join("");
}

/*
========================================
LOGIN
========================================
*/

async function login(){

    const password =
        document
        .getElementById("password")
        .value;

    const hashed =
        await md5(password);

    if(hashed === HASH){

        document
        .getElementById("overlay")
        .style.display = "none";

        document
        .getElementById("content")
        .classList.add("unlocked");

        sessionStorage.setItem(
            "auth",
            "ok"
        );

    }else{

        document
        .getElementById("error")
        .style.display = "block";

        navigator.vibrate?.(120);

    }
}

/*
========================================
SESSION CHECK
========================================
*/

if(sessionStorage.getItem("auth")==="ok"){

    document
    .getElementById("overlay")
    .style.display = "none";

    document
    .getElementById("content")
    .classList.add("unlocked");
}

/*
========================================
ANTI RIGHT CLICK
========================================
*/

document.addEventListener(
    "contextmenu",
    e => e.preventDefault()
);

/*
========================================
ANTI DEVTOOLS LIGHT
========================================
*/

document.onkeydown = function(e){

    if(
        e.keyCode == 123 ||
        (e.ctrlKey && e.shiftKey && e.keyCode == 73) ||
        (e.ctrlKey && e.keyCode == 85)
    ){
        return false;
    }
};

</script>

</body>
</html>
