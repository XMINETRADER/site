<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Email Checker Pro</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial, sans-serif;
    }

    body{
        background:#0f172a;
        min-height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        color:white;
    }

    .container{
        width:100%;
        max-width:500px;
        background:#111827;
        padding:35px;
        border-radius:20px;
        box-shadow:0 0 30px rgba(0,0,0,0.5);
    }

    h1{
        text-align:center;
        margin-bottom:10px;
        font-size:28px;
        color:#facc15;
    }

    p{
        text-align:center;
        color:#94a3b8;
        margin-bottom:25px;
    }

    .input-group{
        display:flex;
        gap:10px;
    }

    input{
        flex:1;
        padding:14px;
        border:none;
        border-radius:12px;
        background:#1e293b;
        color:white;
        font-size:15px;
    }

    input:focus{
        outline:none;
        border:1px solid #facc15;
    }

    button{
        padding:14px 20px;
        border:none;
        border-radius:12px;
        background:#facc15;
        color:#000;
        font-weight:bold;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover{
        background:#fde047;
    }

    .result{
        margin-top:25px;
        padding:18px;
        border-radius:14px;
        display:none;
        font-size:15px;
        line-height:1.7;
    }

    .success{
        background:#052e16;
        border:1px solid #22c55e;
        color:#bbf7d0;
    }

    .error{
        background:#450a0a;
        border:1px solid #ef4444;
        color:#fecaca;
    }

    .warning{
        background:#3f2d00;
        border:1px solid #facc15;
        color:#fde68a;
    }

    .footer{
        margin-top:20px;
        text-align:center;
        font-size:12px;
        color:#64748b;
    }
</style>
</head>

<body>

<div class="container">

    <h1>Email Checker</h1>
    <p>Cek format & validasi domain email</p>

    <div class="input-group">
        <input type="email" id="email" placeholder="contoh@email.com">
        <button onclick="checkEmail()">CHECK</button>
    </div>

    <div id="result" class="result"></div>

    <div class="footer">
        Premium HTML Email Validator
    </div>

</div>

<script>
async function checkEmail() {

    const email = document.getElementById("email").value.trim();
    const result = document.getElementById("result");

    result.style.display = "block";

    // Validasi format email
    const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    if (!regex.test(email)) {
        result.className = "result error";
        result.innerHTML = `
            ❌ Format email tidak valid
        `;
        return;
    }

    // Ambil domain email
    const domain = email.split("@")[1];

    try {

        // Cek DNS MX menggunakan Google DNS API
        const response = await fetch(
            `https://dns.google/resolve?name=${domain}&type=MX`
        );

        const data = await response.json();

        if (data.Answer && data.Answer.length > 0) {

            result.className = "result success";
            result.innerHTML = `
                ✅ Domain email valid<br><br>
                📧 Email: <b>${email}</b><br>
                🌐 Domain: <b>${domain}</b><br>
                📨 MX Record ditemukan
            `;

        } else {

            result.className = "result warning";
            result.innerHTML = `
                ⚠️ Domain tidak memiliki MX Record<br><br>
                Email kemungkinan tidak aktif
            `;
        }

    } catch (err) {

        result.className = "result error";
        result.innerHTML = `
            ❌ Gagal memeriksa email<br><br>
            ${err.message}
        `;
    }
}
</script>

</body>
</html>
